# ═══════════════════════════════════════
# 工作流规则
# ═══════════════════════════════════════

[workflow]
description = """
  1. FREEZE: lock 区的文件只能用 replace_in_file 做最小增量修改。
     - 禁止 write_to_file 全量覆盖任何 lock 区文件。
     - 每次对 lock 区文件的修改，old_str 和 new_str 必须明确是局部改动。
  2. REVIEW: lock 区文件的每次修改后，必须自动运行 diff check，
     确认未引入无关改动（如意外删行、添加调试代码等）。
  3. STABLE: stable 区的文件允许修改，但每次修改前需确认必要性。
     修复 UI bug 不应该动 Cargo.toml。
  4. ACTIVE: active 区的文件允许自由修改，无限制。
  5. UNLOCK: 如需对 lock 文件做大范围修改，必须先更新 BASELINE.toml
     将该文件移至 active 区，修改完成后视验证结果再冻回 lock 区。
"""

[workflow.constraints]
# 以下是硬性约束（自动检查，不是 guideline）
max_files_per_change = 3        # 单次修改不允许超过 3 个文件
require_baseline_check = true   # 每次写操作前必须检查 BASELINE.toml
lock_violation = "abort"        # 违规时中止并提示，不执行

# ═══════════════════════════════════════
# 交付闭环 SOP (Standard Operating Procedure)
# ═══════════════════════════════════════

[workflow.sop]
description = """
  每次任务完成后的标准闭环流程，确保修复不会回退、知识不会丢失。
"""

[workflow.sop.develop]
# 开发阶段
name = "开发迭代"
steps = [
  "1. 读 BASELINE.toml：确认目标文件所属区域 (lock/stable/active)",
  "2. lock 区文件：只用 replace_in_file 做最小增量，禁止 write_to_file",
  "3. stable 区文件：确认改动必要性（修UI不动Cargo.toml，修引擎不动UI组件）",
  "4. active 区文件：自由修改，无限制",
  "5. 单次改动 ≤3 文件，跨区自动检查"
]

[workflow.sop.verify]
# 验证阶段
name = "构建验证"
steps = [
  "1. cargo build --manifest-path src-tauri/Cargo.toml 零 error 零 warning",
  "2. 检查改动的 diff：确认未引入无关变更（意外删行、调试代码残留）",
  "3. 如有 lock 区文件改动，做 diff review 确认 old_str → new_str 映射精确",
  "4. 启动 DEV 模式 (npm run tauri dev) 验证正向用例",
  "5. 验证边界用例：不推荐模型时的错误提示、空文件、坏格式输入"
]

[workflow.sop.deliver]
# 交付阶段
name = "交付闭环"
steps = [
  "1. 验证关键功能路径：拖入文件 → 引擎检测 → 模型存在 → 转写成功 → 结果预览 → 导出",
  "2. 确认质量门禁 G1-G8 全部通过 (见 PROJECT-HANDBOOK.md 9.4)",
  "3. 更新 BASELINE.toml：将新验证通过的文件加入 lock 区，注明原因和时间",
  "4. 更新 PROJECT-HANDBOOK.md：记录开发日志、新发现的 Trap、架构变更",
  "5. 更新记忆系统：对本次交付中形成的规则/陷阱/模板，调用 update_memory 沉淀为持久知识",
  "6. 最终确认：用户反馈 '能正常使用' 即交付成功，闭环完成"
]

[workflow.sop.close]
# 闭环节点
name = "经验闭环"
steps = [
  "1. 盘点本次交付中新发现的 Trap 或反模式 → 写入 PROJECT-HANDBOOK.md Trap速查表",
  "2. 如 BASELINE.toml 文件分类需要调整 → 更新 lock/stable/active 边界",
  "3. 如规则需要强化 → 更新记忆，增加红线标记",
  "4. 如工具链/脚本需要改进 → 更新 scripts/ 目录",
  "5. 输出闭环总结：改了哪些文件、学到了什么、下次如何避免"
]

[workflow.sop.release]
# 发布阶段 — 交付后必须执行的外部发布流程
name = "外部发布"
steps = [
  "1. 确认质量门禁 G1-G6 全部通过（见 PROJECT-HANDBOOK.md 9.4）",
  "2. 更新版本号：tauri.conf.json + Cargo.toml + build-dmg.sh 中的 VERSION",
  "3. 构建 DMG：zsh scripts/build-dmg.sh（会自动杀旧进程 + 备份旧版本 + 嵌入 README）",
  "4. Git tag：git tag -a 'v{版本号}' -m 'release: v{版本号} {简短描述}' → git push origin --tags",
  "5. 双仓库推送：git push origin main && git push gitee main",
  "6. GitHub Releases：通过 gh release create 或 Web UI 上传 DMG 作为附件",
  "7. 验证：在新环境下载 DMG → 去隔离 → 运行 → 确认功能完整"
]

# ═══════════════════════════════════════════
# 脚本目录职责 (scripts/)
# ═══════════════════════════════════════════

[workflow.scripts]
description = """
  8 个脚本的职责分工，避免混淆。
"""

[workflow.scripts."bundle-all.sh"]
role = "主依赖打包"
desc = "递归收集 ffmpeg + whisper-cli 及所有 brew dylib，install_name_tool → @loader_path，ad-hoc 签名。零硬编码路径。"
trigger = "构建 DMG 前 / 新增外部依赖后"
output = "src-tauri/resources/ffmpeg-bundle/ + whisper-cli-bundle/"

[workflow.scripts."build-dmg.sh"]
role = "主构建入口"
desc = "完整 DMG 构建管道：杀旧进程 → 备份 → bundle-all → tauri build → 嵌入 README → create-dmg → 质量审计"
trigger = "发布新版本时"
output = "src-tauri/target/release/bundle/dmg/小柳语音转写_{ver}_{arch}.dmg + 时间戳副本"

[workflow.scripts."build.sh"]
role = "构建入口转发"
desc = "一键入口，转发到 build-dmg.sh"
trigger = "npm run dist"

[workflow.scripts."dev-tail.sh"]
role = "DEV 日志监控"
desc = "tail -f /tmp/voice2text-debug.log，开发调试用"
trigger = "DEV 模式排查问题时"

[workflow.scripts."bundle-ffmpeg.sh"]
role = "旧版打包（已废弃）"
desc = "仅打包 ffmpeg 到 resources/bundled/，不处理 whisper-cli。已被 bundle-all.sh 替代。"
status = "deprecated"

[workflow.scripts."copy-dylibs.sh"]
role = "旧版复制（已废弃）"
desc = "硬编码 ffmpeg 8.1.2_1 路径，仅复制不做 install_name_tool。已被 bundle-all.sh 替代。"
status = "deprecated"

[workflow.scripts."copy-ffmpeg.sh"]
role = "旧版复制（已废弃）"
desc = "硬编码路径复制 ffmpeg + 第一层 dylib 到 resources/bundled/。已被 bundle-all.sh 替代。"
status = "deprecated"

[workflow.scripts."fix-dylibs.sh"]
role = "旧版修复（已废弃）"
desc = "修复已复制到 ffmpeg-bundle/ 的 dylib 引用。已被 bundle-all.sh 内置的 install_name_tool 步骤替代。"
status = "deprecated"

# ═══════════════════════════════════════
# Git 双仓库推送规范
# ═══════════════════════════════════════

[workflow.git]
description = """
  项目同时托管在 GitHub 和 Gitee，每次发布需双仓库同步。
"""
remotes = [
  {name = "origin", url = "git@github.com:jaminliu89/voice2text.git", role = "primary"},
  {name = "gitee", url = "https://gitee.com/jaminkim/voice2text.git", role = "mirror"}
]

[workflow.git.push_checklist]
steps = [
  "1. git status 确认无未提交变更",
  "2. git push origin main 推主仓库",
  "3. git push gitee main 推镜像仓库",
  "4. git push origin --tags && git push gitee --tags 推送 tag",
  "5. GitHub Releases 页面确认 DMG 附件已上传"
]

# ═══════════════════════════════════════
# 修复方法论 (Fix Methodology)
# ═══════════════════════════════════════

[workflow.fix_methodology]
description = """
  修 Bug 必须遵循的三层策略，避免修一个引入三个。
  每次修完执行正向/边界/异常测试闭环。
"""

[workflow.fix_methodology.layer1]
name = "直接修复层"
scope = "语法错误、类型不匹配、路径错误、字段名变更"
approach = "最小改动直接 fix，不碰任何无关代码"

[workflow.fix_methodology.layer2]
name = "引导式诊断层"
scope = "逻辑错误、状态不一致、竞态条件"
approach = "分析 3-5 种可能原因，给出诊断方法，用户确认后最小改动"

[workflow.fix_methodology.layer3]
name = "手动深度介入层"
scope = "底层依赖 Bug、编译器 Bug、OS 兼容性问题"
approach = "传统工具排查，保留完整日志链"

[workflow.fix_methodology.regression]
name = "回归测试清单"
checks = [
  "正向：正常输入 → 预期输出",
  "边界：空输入、超大输入、错误格式 → 合理错误提示",
  "异常：网络断开、磁盘满、权限不足 → 不崩溃，有兜底",
  "引擎状态：平台推荐模型不存在 → 显示正确提示而非假就绪",
  "竞态：快速连续操作、并发文件 → 状态不混乱"
]

# ═══════════════════════════════════════
# DMG 构建 Trap 速查 (构建管道专用)
# ═══════════════════════════════════════

[workflow.build_traps]
description = "DMG 构建过程中发现的关键陷阱"

[workflow.build_traps."trap-1"]
name = "@rpath 依赖未收集"
symptom = "whisper-cli 冒烟测试失败，libwhisper.1.dylib 找不到"
cause = "whisper-cli 依赖 @rpath/libwhisper.1.dylib（rpath = @loader_path/../lib），otool -L 不显示绝对路径，递归收集时漏掉"
fix = "bundle-all.sh 在复制源二进制前解析 LC_RPATH → 解析 @rpath 引用 → 预收集依赖"

[workflow.build_traps."trap-2"]
name = "otool rpath 输出含 offset 后缀"
symptom = "sed 解析 rpath 失败，路径带 '(offset 12)' 垃圾字符"
cause = "otool -l 输出的 path 行格式为 'path /xxx (offset 12)'"
fix = "sed 's/ (offset.*)//' 去掉后缀"

[workflow.build_traps."trap-3"]
name = "Tauri 自带 DMG 构建失败"
symptom = "npx tauri build 的 bundle_dmg.sh 阶段报错"
cause = "Tauri 2 内置的 DMG 打包器在某些环境下不稳定"
fix = "tauri.conf.json → bundle.targets = ['app'] 禁用 Tauri DMG 构建，改用 create-dmg CLI 手动打包"

[workflow.build_traps."trap-4"]
name = "local 关键字在顶层函数外使用"
symptom = "build-dmg.sh 报语法错误"
cause = "zsh 不允许 local 声明在函数体外"
fix = "改用普通变量名（如 _ts, _build_id）"
